<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovusEdge</title>
    <link rel="icon" href="/favicon.ico" sizes="32x32" />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <script>
      (function () {
        var t = localStorage.theme || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        document.documentElement.classList.toggle('dark', t === 'dark')
      })()
    </script>

    />

      href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&f[]=amulya@400,500,700,900&display=swap"
      rel="stylesheet"
    />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
